<!doctype html>
<html lang="my">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Denu Coffee TikTok Generator</title>
  <style>
    @font-face {
      font-family: "MyanmarSafe";
      src: local("Myanmar Text"), local("Myanmar3"), local("Myanmar Unicode"), local("Noto Sans Myanmar");
    }

    :root {
      --coffee: #24170f;
      --cream: #fff4e4;
      --milk: #f6dfbd;
      --caramel: #d99a4e;
      --berry: #c44f68;
      --citrus: #f3b642;
      --leaf: #3f7a55;
      --ink: #21180f;
      --title-scale: 1;
      --body-scale: 1;
      --myanmar-font: MyanmarSafe, "Myanmar Text", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #14100d;
      color: var(--cream);
      font-family: var(--myanmar-font);
    }

    body.export-mode {
      width: calc(1080px * var(--export-scale, 1));
      min-height: calc(1350px * var(--export-scale, 1));
      display: block;
      overflow: hidden;
      background: #14100d;
    }

    body.export-mode .stage {
      transform: scale(var(--export-scale, 1));
      transform-origin: top left;
    }

    .stage {
      width: 1080px;
      height: 1350px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 12%, rgba(255,244,228,.22), transparent 28%),
        radial-gradient(circle at 82% 18%, rgba(196,79,104,.25), transparent 28%),
        linear-gradient(150deg, #2b1a11 0%, #51331f 44%, #1c120d 100%);
      isolation: isolate;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 54px 54px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.9), rgba(0,0,0,.15));
      z-index: -2;
    }

    .stage::after {
      content: "";
      position: absolute;
      width: 900px;
      height: 900px;
      right: -260px;
      bottom: -260px;
      background:
        radial-gradient(circle, rgba(217,154,78,.26) 0 16%, transparent 17%),
        conic-gradient(from 20deg, rgba(255,244,228,.18), rgba(196,79,104,.2), rgba(63,122,85,.18), rgba(255,244,228,.18));
      border-radius: 50%;
      filter: blur(.2px);
      opacity: .95;
      z-index: -1;
    }

    .topbar {
      position: absolute;
      left: 64px;
      right: 64px;
      top: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .logo {
      width: 252px;
      height: auto;
      display: block;
    }

    .day {
      min-width: 158px;
      padding: 16px 26px 13px;
      border: 2px solid rgba(255,244,228,.42);
      border-radius: 999px;
      color: var(--cream);
      text-align: center;
      font: 800 31px/1 Arial, sans-serif;
      background: rgba(36,23,15,.46);
      backdrop-filter: blur(8px);
    }

    .content {
      position: absolute;
      inset: 184px 64px 70px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 30px;
    }

    .hook-title,
    .main-title {
      margin: 0;
      color: var(--cream);
      font-weight: 900;
      line-height: 1.24;
      letter-spacing: 0;
      text-wrap: balance;
      text-shadow: 0 8px 28px rgba(0,0,0,.36);
    }

    .hook-title { font-size: calc(78px * var(--title-scale)); max-width: 920px; }
    .main-title { font-size: calc(62px * var(--title-scale)); max-width: 920px; }

    .hook-body,
    .footer {
      color: #ffe1b3;
      font-weight: 700;
      line-height: 1.48;
      letter-spacing: 0;
    }

    .hook-body {
      max-width: 790px;
      font-size: calc(38px * var(--body-scale));
    }

    .visual-row {
      display: flex;
      gap: 30px;
      align-items: center;
      min-height: 390px;
    }

    .hero-cup {
      width: 408px;
      height: 408px;
      position: relative;
      flex: 0 0 408px;
    }

    .plate {
      position: absolute;
      inset: 66px 26px 24px;
      border-radius: 50%;
      background: #f6dfbd;
      box-shadow: 0 34px 90px rgba(0,0,0,.38);
    }

    .coffee {
      position: absolute;
      inset: 112px 72px 72px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 38% 35%, #9f6a3c 0 7%, transparent 8%),
        radial-gradient(circle at 58% 62%, #5b321d 0 16%, transparent 17%),
        radial-gradient(circle, #3b2114 0 52%, #1f120d 53% 100%);
      border: 18px solid #fff4e4;
      box-shadow: inset 0 0 0 10px rgba(217,154,78,.22);
    }

    .fruit {
      position: absolute;
      border-radius: 50%;
      box-shadow: 0 18px 36px rgba(0,0,0,.28);
    }

    .fruit.berry { width: 84px; height: 84px; left: 18px; bottom: 74px; background: var(--berry); }
    .fruit.orange { width: 112px; height: 112px; right: 4px; top: 46px; background: var(--citrus); }
    .fruit.leaf { width: 80px; height: 42px; right: 52px; bottom: 50px; background: var(--leaf); border-radius: 80px 8px 80px 8px; transform: rotate(-18deg); }

    .tag-stack {
      flex: 1;
      display: grid;
      gap: 18px;
    }

    .tag {
      padding: 23px 27px 20px;
      color: var(--cream);
      background: rgba(255,244,228,.11);
      border: 1px solid rgba(255,244,228,.24);
      border-radius: 8px;
      font: 800 31px/1.15 Arial, sans-serif;
      box-shadow: 0 18px 42px rgba(0,0,0,.18);
    }

    .sections {
      display: grid;
      gap: 22px;
      margin-top: 20px;
    }

    .section {
      padding: 27px 30px 24px;
      border-radius: 8px;
      background: rgba(255,244,228,.94);
      color: var(--ink);
      box-shadow: 0 18px 55px rgba(0,0,0,.25);
      border-left: 13px solid var(--caramel);
    }

    .section:nth-child(2) { border-left-color: var(--berry); }
    .section:nth-child(3) { border-left-color: var(--leaf); }

    .section h2 {
      margin: 0 0 12px;
      color: #8f4f23;
      font: 900 35px/1.05 Arial, sans-serif;
      letter-spacing: 0;
    }

    .section p {
      margin: 0;
      font-size: calc(31px * var(--body-scale));
      font-weight: 650;
      line-height: 1.48;
      letter-spacing: 0;
    }

    .footer {
      margin-top: 16px;
      padding: 25px 30px 22px;
      font-size: calc(33px * var(--body-scale));
      background: rgba(36,23,15,.7);
      border: 1px solid rgba(255,244,228,.24);
      border-radius: 8px;
    }

    .audit {
      position: fixed;
      left: 16px;
      bottom: 16px;
      max-width: 760px;
      padding: 12px 14px;
      border-radius: 8px;
      background: #fff;
      color: #111;
      font: 14px/1.4 Consolas, monospace;
      display: none;
      white-space: pre-wrap;
    }

    body.audit-on .audit { display: block; }

    body.theme-minimal .stage {
      background: linear-gradient(145deg, #25313a 0%, #45525a 100%);
    }

    body.theme-minimal .stage::after {
      opacity: .3;
      filter: grayscale(1);
    }

    body.theme-fresh .stage {
      background: linear-gradient(145deg, #18382d 0%, #3f7a55 55%, #172a23 100%);
    }

    body.theme-fresh .stage::after {
      opacity: .62;
    }

    body.theme-dark .stage {
      background: linear-gradient(145deg, #101010 0%, #2b211d 55%, #090909 100%);
    }

    body.theme-dark .stage::after {
      opacity: .45;
      filter: grayscale(.65);
    }

    /* NeoRoast default visual system: warm educational cards over a branded photo layer. */
    .stage {
      background: #f7ead8 url("assets/neoroast-background.png") center/cover no-repeat;
      color: #321a08;
    }

    .stage::before {
      background: linear-gradient(180deg, rgba(255,248,236,.08), rgba(255,248,236,.18));
      mask-image: none;
    }

    .stage::after { display: none; }

    .topbar {
      left: 32px;
      right: 38px;
      top: 28px;
      flex-direction: row-reverse;
      align-items: flex-start;
    }

    .logo { width: 278px; }

    .day {
      min-width: 220px;
      padding: 17px 27px 16px;
      border: 0;
      color: #fffaf0;
      font-size: 34px;
      background: #321a08;
      box-shadow: 0 9px 26px rgba(50,26,8,.12);
    }

    .day::before,
    .day::after {
      content: "◆";
      margin: 0 13px;
      color: #d99436;
      font-size: 19px;
      vertical-align: 3px;
    }

    .content {
      inset: 188px 66px 116px;
      gap: 23px;
    }

    .hook-content {
      justify-content: flex-start;
      text-align: center;
      padding-top: 76px;
    }

    .hook-title,
    .main-title {
      max-width: 948px;
      color: #321a08;
      text-shadow: 0 4px 16px rgba(255,244,228,.78);
    }

    .hook-title { font-size: calc(76px * var(--title-scale)); }
    .main-title { font-size: calc(57px * var(--title-scale)); text-align: center; }

    .hook-body {
      max-width: 800px;
      margin: 36px auto 0;
      padding: 18px 24px;
      color: #fffaf0;
      font-size: calc(34px * var(--body-scale));
      background: rgba(80,38,7,.94);
      border-radius: 999px;
    }

    .hook-content .visual-row {
      display: none;
    }

    .sections {
      gap: 16px;
      margin-top: 27px;
    }

    .section {
      min-height: 194px;
      padding: 24px 28px 22px;
      border: 1px solid rgba(171,111,53,.34);
      border-left: 1px solid rgba(171,111,53,.34);
      border-radius: 18px;
      color: #321a08;
      background: rgba(255,247,235,.82);
      box-shadow: 0 12px 34px rgba(94,57,23,.07);
    }

    .section:nth-child(2),
    .section:nth-child(3) {
      border-left-color: rgba(171,111,53,.34);
    }

    .section h2 {
      margin-bottom: 10px;
      padding-right: 66px;
      color: #321a08;
      font-size: 36px;
    }

    .section p {
      font-size: calc(29px * var(--body-scale));
      line-height: 1.42;
    }

    .footer {
      margin-top: 8px;
      padding: 18px 24px 17px;
      color: #fffaf0;
      font-size: calc(29px * var(--body-scale));
      text-align: center;
      background: rgba(80,38,7,.94);
      border: 0;
      border-radius: 999px;
    }

    .brand-signature {
      position: absolute;
      left: 50%;
      bottom: 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      color: #321a08;
      font: 700 15px/1 Arial, sans-serif;
      letter-spacing: 4px;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    .brand-signature::before,
    .brand-signature::after {
      content: "";
      width: 72px;
      border-top: 1px solid rgba(50,26,8,.56);
    }

    .brand-bean {
      width: 16px;
      height: 16px;
      display: inline-block;
      border-radius: 50%;
      background: #321a08;
      transform: rotate(-32deg);
    }

    .topic-visual {
      width: min(760px, 100%);
      min-height: 236px;
      margin: 34px auto 0;
      display: grid;
      grid-template-columns: 218px 1fr;
      align-items: center;
      gap: 26px;
      padding: 22px 28px;
      border: 1px solid rgba(171,111,53,.28);
      border-radius: 22px;
      background: rgba(255,247,235,.76);
      box-shadow: 0 14px 40px rgba(94,57,23,.08);
    }

    .topic-orb {
      width: 176px;
      height: 176px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #fff8ea;
      font: 700 92px/1 Arial, sans-serif;
      background: var(--scene-accent, #6e3b16);
      box-shadow: inset 0 0 0 12px rgba(255,248,234,.12);
    }

    .scene-artwork {
      position: relative;
      width: 176px;
      height: 176px;
      overflow: hidden;
      border-radius: 50%;
      background: var(--scene-accent, #6e3b16);
      box-shadow: inset 0 0 0 12px rgba(255,248,234,.12);
    }

    .scene-artwork span {
      position: absolute;
      display: block;
    }

    .art-cup {
      left: 43px;
      bottom: 38px;
      width: 82px;
      height: 50px;
      border: 7px solid #fff3dc;
      border-top: 0;
      border-radius: 0 0 34px 34px;
    }

    .art-cup::after {
      content: "";
      position: absolute;
      right: -31px;
      top: 5px;
      width: 27px;
      height: 25px;
      border: 7px solid #fff3dc;
      border-left: 0;
      border-radius: 0 22px 22px 0;
    }

    .art-steam {
      bottom: 97px;
      width: 18px;
      height: 50px;
      border-left: 5px solid #fff3dc;
      border-radius: 50%;
      opacity: .88;
      animation: steamRise 2.8s ease-in-out infinite;
    }

    .art-steam.s1 { left: 60px; }
    .art-steam.s2 { left: 83px; height: 61px; animation-delay: .5s; }
    .art-steam.s3 { left: 106px; animation-delay: 1s; }

    .art-bean {
      width: 25px;
      height: 18px;
      border-radius: 50%;
      background: #d08a3e;
      transform: rotate(-24deg);
      box-shadow: inset -5px -2px 0 rgba(83,39,12,.24);
      animation: beanFloat 3s ease-in-out infinite;
    }

    .art-bean::after {
      content: "";
      position: absolute;
      left: 11px;
      top: 1px;
      height: 16px;
      border-left: 2px solid rgba(83,39,12,.56);
      transform: rotate(18deg);
    }

    .art-leaf {
      width: 49px;
      height: 28px;
      border-radius: 80% 0 80% 0;
      background: #88a947;
      transform: rotate(-28deg);
      box-shadow: inset -5px -3px 0 rgba(42,76,29,.2);
    }

    .art-spark {
      color: #fff1b6;
      font: 900 34px/1 Arial, sans-serif;
      animation: sparkle 2.1s ease-in-out infinite;
    }

    .art-drum {
      left: 45px;
      top: 51px;
      width: 88px;
      height: 69px;
      border: 7px solid #fff3dc;
      border-radius: 24px;
      background: rgba(255,243,220,.16);
    }

    .art-drum::before {
      content: "";
      position: absolute;
      left: 13px;
      top: 23px;
      width: 49px;
      border-top: 7px solid #fff3dc;
    }

    .art-drum::after {
      content: "";
      position: absolute;
      left: 35px;
      top: 3px;
      height: 56px;
      border-left: 7px solid #fff3dc;
    }

    .art-flame {
      bottom: 24px;
      width: 24px;
      height: 41px;
      border-radius: 70% 20% 70% 30%;
      background: #f7b340;
      transform: rotate(45deg);
      animation: flame 1.5s ease-in-out infinite;
    }

    .art-flame.f1 { left: 55px; }
    .art-flame.f2 { left: 82px; height: 50px; animation-delay: .35s; }
    .art-flame.f3 { left: 108px; animation-delay: .7s; }

    .art-dripper {
      left: 53px;
      top: 52px;
      width: 72px;
      height: 58px;
      border: 7px solid #fff3dc;
      border-top-width: 12px;
      clip-path: polygon(0 0,100% 0,76% 100%,24% 100%);
      background: rgba(255,243,220,.16);
    }

    .art-drop {
      left: 82px;
      top: 118px;
      width: 15px;
      height: 22px;
      border-radius: 60% 60% 70% 70%;
      background: #a9d8ef;
      animation: drip 1.6s ease-in infinite;
    }

    .art-jar {
      left: 52px;
      top: 45px;
      width: 73px;
      height: 90px;
      border: 7px solid #fff3dc;
      border-radius: 10px 10px 20px 20px;
      background: rgba(255,243,220,.14);
    }

    .art-jar::before {
      content: "";
      position: absolute;
      left: -2px;
      top: -17px;
      width: 63px;
      border-top: 11px solid #fff3dc;
      border-radius: 5px;
    }

    .art-cherry {
      width: 27px;
      height: 27px;
      border-radius: 50%;
      background: #c94734;
      box-shadow: inset -5px -4px 0 rgba(100,32,25,.2);
      animation: beanFloat 2.8s ease-in-out infinite;
    }

    .art-medal {
      left: 52px;
      top: 38px;
      width: 73px;
      height: 73px;
      display: grid !important;
      place-items: center;
      border: 7px solid #fff3dc;
      border-radius: 50%;
      color: #fff3dc;
      font: 900 41px/1 Arial, sans-serif;
    }

    .art-medal::before,
    .art-medal::after {
      content: "";
      position: absolute;
      bottom: -44px;
      width: 26px;
      height: 51px;
      background: #fff3dc;
      clip-path: polygon(0 0,100% 0,100% 100%,50% 78%,0 100%);
    }

    .art-medal::before { left: 4px; }
    .art-medal::after { right: 4px; }

    .mini-visual {
      position: absolute;
      right: 18px;
      top: 18px;
      display: grid;
      width: 54px;
      height: 54px;
      place-items: center;
      border-radius: 50%;
      color: #fff8ea;
      font: 700 29px/1 Arial, sans-serif;
      background: var(--scene-accent, #6e3b16);
      box-shadow: 0 7px 18px rgba(76,43,16,.15);
    }

    @keyframes steamRise {
      0%, 100% { opacity: .42; transform: translateY(6px) scale(.92); }
      50% { opacity: 1; transform: translateY(-7px) scale(1.08); }
    }

    @keyframes beanFloat {
      0%, 100% { transform: translateY(0) rotate(-24deg); }
      50% { transform: translateY(-7px) rotate(-11deg); }
    }

    @keyframes sparkle {
      0%, 100% { opacity: .45; transform: scale(.82); }
      50% { opacity: 1; transform: scale(1.18); }
    }

    @keyframes flame {
      0%, 100% { transform: rotate(45deg) scale(.86); }
      50% { transform: rotate(45deg) scale(1.12); }
    }

    @keyframes drip {
      0% { opacity: 0; transform: translateY(-8px); }
      25% { opacity: 1; }
      100% { opacity: 0; transform: translateY(24px); }
    }

    body.video-mode .topbar,
    body.video-mode .hook-title,
    body.video-mode .main-title,
    body.video-mode .hook-body,
    body.video-mode .topic-visual,
    body.video-mode .section,
    body.video-mode .footer {
      animation: videoEnter .72s cubic-bezier(.22,.78,.24,1) both;
    }

    body.video-mode .hook-body,
    body.video-mode .topic-visual,
    body.video-mode .section:nth-child(1) { animation-delay: .2s; }
    body.video-mode .section:nth-child(2) { animation-delay: .38s; }
    body.video-mode .section:nth-child(3),
    body.video-mode .footer { animation-delay: .56s; }

    @keyframes videoEnter {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .topic-copy {
      color: #321a08;
      text-align: left;
    }

    .topic-label {
      margin: 0 0 12px;
      color: var(--scene-accent, #6e3b16);
      font: 900 35px/1.1 Arial, sans-serif;
    }

    .topic-note {
      margin: 0;
      font: 700 25px/1.4 Arial, sans-serif;
    }

    .section-grid {
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .section-grid .section {
      min-height: 370px;
      padding: 23px 20px;
    }

    .section-grid .section h2 { font-size: 30px; }
    .section-grid .section p { font-size: calc(26px * var(--body-scale)); }

    .section-timeline .section {
      margin-left: 42px;
      position: relative;
    }

    .section-timeline .section::before {
      content: attr(data-step);
      position: absolute;
      left: -62px;
      top: 50%;
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #fff8ea;
      font: 900 23px/1 Arial, sans-serif;
      background: var(--scene-accent, #6e3b16);
      transform: translateY(-50%);
    }

    .section-accent .section:nth-child(1) { background: rgba(255,239,220,.88); }
    .section-accent .section:nth-child(2) { background: rgba(247,244,215,.88); }
    .section-accent .section:nth-child(3) { background: rgba(236,246,226,.88); }

    .scene-fruit { --scene-accent: #963c4a; }
    .scene-citrus { --scene-accent: #c97700; }
    .scene-aroma { --scene-accent: #466321; }
    .scene-brew { --scene-accent: #92561c; }
    .scene-roast { --scene-accent: #5a2d14; }
    .scene-process { --scene-accent: #5f6d32; }
    .scene-origin { --scene-accent: #3f6b4a; }
    .scene-greenbean { --scene-accent: #5f7a37; }
    .scene-specialty { --scene-accent: #9a5e08; }

    .scene-fruit .hook-body,
    .scene-citrus .hook-body,
    .scene-aroma .hook-body,
    .scene-brew .hook-body,
    .scene-roast .hook-body,
    .scene-process .hook-body,
    .scene-origin .hook-body,
    .scene-fruit .footer,
    .scene-citrus .footer,
    .scene-aroma .footer,
    .scene-brew .footer,
    .scene-roast .footer,
    .scene-process .footer,
    .scene-origin .footer {
      background: color-mix(in srgb, var(--scene-accent) 84%, #321a08);
    }

    .scene-fruit .stage-art,
    .scene-citrus .stage-art,
    .scene-aroma .stage-art,
    .scene-brew .stage-art,
    .scene-roast .stage-art,
    .scene-process .stage-art,
    .scene-origin .stage-art,
    .scene-greenbean .stage-art,
    .scene-specialty .stage-art {
      display: block;
    }

    .stage-art {
      position: absolute;
      right: 74px;
      bottom: 176px;
      display: none;
      color: var(--scene-accent);
      font: 700 84px/1 Arial, sans-serif;
      opacity: .15;
    }

    body.theme-minimal .stage,
    body.theme-fresh .stage,
    body.theme-dark .stage {
      background-image: url("assets/neoroast-background.png");
      background-size: cover;
      background-position: center;
    }

    .video-scene .content {
      inset: 168px 64px 118px;
      justify-content: center;
    }

    .video-scene-shell {
      min-height: 820px;
      display: grid;
      grid-template-columns: 390px 1fr;
      align-items: center;
      gap: 34px;
      padding: 34px;
      border: 1px solid rgba(171,111,53,.32);
      border-radius: 26px;
      background: rgba(255,247,235,.72);
      box-shadow: 0 22px 60px rgba(83,47,17,.12);
      backdrop-filter: blur(2px);
    }

    .video-visual-panel {
      position: relative;
      min-height: 560px;
      display: grid;
      place-items: center;
      overflow: hidden;
      border-radius: 24px;
      background:
        radial-gradient(circle at 50% 45%, rgba(255,248,234,.9), rgba(255,248,234,.18) 42%, transparent 43%),
        linear-gradient(180deg, rgba(255,247,235,.82), rgba(235,199,153,.42));
    }

    .video-visual-panel .scene-artwork {
      width: 250px;
      height: 250px;
      transform: scale(1.18);
      animation: visualPulse 3.2s ease-in-out infinite;
      z-index: 2;
    }

    .video-copy {
      position: relative;
      z-index: 2;
    }

    .video-kicker {
      width: max-content;
      max-width: 100%;
      margin: 0 0 24px;
      padding: 13px 22px 11px;
      border-radius: 999px;
      color: #fff8ea;
      font: 900 25px/1 Arial, sans-serif;
      background: var(--scene-accent, #6e3b16);
    }

    .video-title {
      margin: 0;
      color: #321a08;
      font-size: calc(57px * var(--title-scale));
      font-weight: 900;
      line-height: 1.28;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .video-body {
      margin: 26px 0 0;
      color: #4a2b12;
      font-size: calc(31px * var(--body-scale));
      font-weight: 700;
      line-height: 1.48;
      letter-spacing: 0;
    }

    .subtitle-strip {
      position: absolute;
      left: 66px;
      right: 66px;
      bottom: 70px;
      min-height: 86px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 17px 30px 15px;
      border-radius: 999px;
      color: #fff8ea;
      text-align: center;
      font-size: calc(30px * var(--body-scale));
      font-weight: 800;
      line-height: 1.35;
      background: rgba(50,26,8,.94);
      box-shadow: 0 16px 44px rgba(50,26,8,.18);
      z-index: 5;
    }

    .step-badge {
      position: absolute;
      left: 24px;
      top: 24px;
      width: 76px;
      height: 76px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #fff8ea;
      font: 900 34px/1 Arial, sans-serif;
      background: var(--scene-accent, #6e3b16);
      box-shadow: 0 12px 24px rgba(50,26,8,.16);
      z-index: 3;
    }

    .video-ring,
    .video-line,
    .video-dot,
    .video-cardlet {
      position: absolute;
      display: block;
      z-index: 1;
    }

    .video-ring {
      width: 330px;
      height: 330px;
      border: 2px solid color-mix(in srgb, var(--scene-accent) 42%, transparent);
      border-radius: 50%;
      animation: spinSlow 16s linear infinite;
    }

    .video-ring.r2 {
      width: 420px;
      height: 420px;
      border-style: dashed;
      animation-direction: reverse;
    }

    .video-dot {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--scene-accent, #6e3b16);
      opacity: .72;
      animation: floatSoft 3s ease-in-out infinite;
    }

    .video-line {
      width: 260px;
      border-top: 4px solid color-mix(in srgb, var(--scene-accent) 52%, #f7ead8);
      transform-origin: left center;
    }

    .video-cardlet {
      width: 135px;
      min-height: 82px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,248,236,.86);
      box-shadow: 0 12px 28px rgba(83,47,17,.12);
    }

    .video-cardlet::before {
      content: "";
      display: block;
      width: 52px;
      height: 10px;
      margin-bottom: 13px;
      border-radius: 999px;
      background: var(--scene-accent, #6e3b16);
    }

    .video-cardlet::after {
      content: "";
      display: block;
      width: 88px;
      height: 10px;
      border-radius: 999px;
      background: rgba(80,38,7,.22);
    }

    .video-layout-hero .video-scene-shell {
      grid-template-columns: 1fr;
      text-align: center;
    }

    .video-layout-hero .video-visual-panel {
      width: 560px;
      min-height: 330px;
      margin: 0 auto;
    }

    .video-layout-hero .video-kicker { margin-left: auto; margin-right: auto; }

    .video-layout-diagram .video-line:nth-child(4) { transform: rotate(25deg); left: 210px; top: 238px; }
    .video-layout-diagram .video-line:nth-child(5) { transform: rotate(-25deg); left: 210px; top: 322px; }

    .video-layout-process .video-visual-panel {
      background:
        linear-gradient(90deg, transparent 48%, rgba(80,38,7,.16) 49%, rgba(80,38,7,.16) 51%, transparent 52%),
        linear-gradient(180deg, rgba(255,247,235,.82), rgba(235,199,153,.42));
    }

    .video-layout-process .video-dot {
      left: calc(50% - 17px);
      animation-name: processMove;
    }

    .video-layout-compare .video-visual-panel {
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      padding: 28px;
    }

    .video-layout-compare .scene-artwork {
      grid-column: 1 / -1;
    }

    .video-layout-checklist .video-cardlet {
      display: grid;
      place-items: center;
    }

    .video-layout-checklist .video-cardlet::before {
      content: "OK";
      width: auto;
      height: auto;
      margin: 0;
      color: #fff8ea;
      padding: 9px 14px;
      font: 900 22px/1 Arial, sans-serif;
    }

    .video-layout-summary .video-scene-shell {
      grid-template-columns: 1fr;
      text-align: center;
      min-height: 760px;
    }

    .video-layout-summary .video-visual-panel {
      min-height: 300px;
      width: 520px;
      margin: 0 auto;
    }

    .video-layout-summary .video-title {
      max-width: 760px;
      margin: 0 auto;
    }

    @keyframes visualPulse {
      0%, 100% { transform: scale(1.12); }
      50% { transform: scale(1.22); }
    }

    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes floatSoft {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-16px); }
    }

    @keyframes processMove {
      0% { top: 90px; opacity: .35; }
      50% { opacity: 1; }
      100% { top: 430px; opacity: .35; }
    }
  </style>
</head>
<body>
  <main id="stage" class="stage" aria-label="TikTok coffee post"></main>
  <pre id="audit" class="audit"></pre>

  <script>
    const params = new URLSearchParams(location.search);
    const dataFile = params.get("data") || "data/day-28.json";
    const slideIndex = Number(params.get("slide") || 0);
    const videoSceneIndex = Number(params.get("videoScene") ?? -1);
    const showAudit = params.get("audit") === "1";

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function lines(value) {
      return escapeHtml(value || "").replace(/\n/g, "<br>");
    }

    function getScene(slide) {
      const text = `${slide.visual || ""} ${slide.title || ""} ${slide.subtitle || ""} ${slide.narration || ""} ${(slide.sections || []).map(item => `${item.heading} ${item.text}`).join(" ")}`.toLowerCase();
      if (/berry|fruit|peach|orange|lemon|citrus|mango|pineapple/.test(text)) return "fruit";
      if (/aroma|smell|fragrance/.test(text)) return "aroma";
      if (/brew|drip|espresso|cold brew|v60|pour over/.test(text)) return "brew";
      if (/roast|roasting/.test(text)) return "roast";
      if (/process|washed|natural|honey|ferment/.test(text)) return "process";
      if (/green bean|raw bean|bean quality|sorting|grading/.test(text)) return "greenbean";
      if (/specialty|quality score|cupping score|sourcing/.test(text)) return "specialty";
      if (/farm|altitude|origin|ethiopia|colombia|myanmar/.test(text)) return "origin";
      return "coffee";
    }

    function getLayout(slide, scene) {
      if (slide.kind === "hook") return "feature";
      if (slide.kind === "summary" || scene === "fruit") return "grid";
      if (scene === "process" || scene === "origin") return "timeline";
      return "accent";
    }

    function getSceneMeta(scene) {
      return {
        fruit: ["🍓", "Flavor Notes", "Berry · Citrus · Tropical"],
        citrus: ["🍊", "Bright Acidity", "Citrus · Clean · Fresh"],
        aroma: ["☕", "Aroma", "Fragrance · Steam · Experience"],
        brew: ["♨", "Brewing", "Water · Time · Extraction"],
        roast: ["◒", "Roasting", "Light · Medium · Dark"],
        process: ["✦", "Processing", "Natural · Washed · Honey"],
        origin: ["⌂", "Origin", "Farm · Altitude · Terroir"],
        greenbean: ["◆", "Green Bean Quality", "Selection · Sorting · Potential"],
        specialty: ["★", "Specialty Coffee", "Quality · Craft · Experience"],
        coffee: ["☕", "Coffee Knowledge", "Learn · Taste · Enjoy"]
      }[scene];
    }

    function renderSceneArtwork(scene) {
      const art = {
        aroma: `<span class="art-cup"></span><span class="art-steam s1"></span><span class="art-steam s2"></span><span class="art-steam s3"></span>`,
        brew: `<span class="art-dripper"></span><span class="art-drop"></span><span class="art-cup" style="transform:scale(.62);left:52px;bottom:18px"></span>`,
        roast: `<span class="art-drum"></span><span class="art-flame f1"></span><span class="art-flame f2"></span><span class="art-flame f3"></span>`,
        process: `<span class="art-jar"></span><span class="art-cherry" style="left:64px;top:77px"></span><span class="art-cherry" style="left:91px;top:93px;animation-delay:.6s"></span>`,
        origin: `<span class="art-leaf" style="left:40px;top:55px"></span><span class="art-leaf" style="left:88px;top:88px;transform:rotate(145deg)"></span><span class="art-bean" style="left:74px;top:73px"></span>`,
        greenbean: `<span class="art-leaf" style="left:35px;top:52px"></span><span class="art-leaf" style="left:89px;top:93px;transform:rotate(145deg)"></span><span class="art-bean" style="left:65px;top:69px;background:#b4ce75"></span><span class="art-bean" style="left:94px;top:88px;background:#d7df9a;animation-delay:.6s"></span>`,
        specialty: `<span class="art-medal">★</span><span class="art-spark" style="left:28px;top:28px">✦</span><span class="art-spark" style="right:25px;top:58px;animation-delay:.7s">✧</span>`,
        fruit: `<span class="art-cherry" style="left:50px;top:76px"></span><span class="art-cherry" style="left:78px;top:60px;animation-delay:.4s"></span><span class="art-cherry" style="left:104px;top:84px;animation-delay:.8s"></span><span class="art-leaf" style="left:68px;top:33px"></span>`,
        coffee: `<span class="art-cup"></span><span class="art-steam s1"></span><span class="art-steam s2"></span><span class="art-steam s3"></span>`
      };
      return `<div class="scene-artwork">${art[scene] || art.coffee}</div>`;
    }

    function renderVideoExtras(layout) {
      if (layout === "diagram") {
        return `<span class="video-ring"></span><span class="video-ring r2"></span><span class="video-line"></span><span class="video-line"></span><span class="video-dot" style="left:80px;top:110px"></span><span class="video-dot" style="right:74px;bottom:128px;animation-delay:.7s"></span>`;
      }
      if (layout === "process") {
        return `<span class="video-dot" style="animation-delay:0s"></span><span class="video-dot" style="animation-delay:1s"></span><span class="video-dot" style="animation-delay:2s"></span>`;
      }
      if (layout === "compare") {
        return `<span class="video-cardlet" style="left:32px;top:54px"></span><span class="video-cardlet" style="right:32px;top:54px"></span><span class="video-line" style="left:124px;bottom:88px"></span>`;
      }
      if (layout === "checklist") {
        return `<span class="video-cardlet" style="left:36px;top:58px"></span><span class="video-cardlet" style="right:36px;top:182px"></span><span class="video-cardlet" style="left:58px;bottom:58px"></span>`;
      }
      return `<span class="video-ring"></span><span class="video-ring r2"></span><span class="video-dot" style="left:74px;top:94px"></span><span class="video-dot" style="right:78px;bottom:108px;animation-delay:.8s"></span>`;
    }

    function renderVideoScene(data, scene, index) {
      const sceneName = getScene(scene);
      const layout = scene.layout || "focus";
      const day = `Day ${data.day}`;
      document.getElementById("stage").className = `stage scene-${sceneName} video-scene video-layout-${layout}`;
      const signature = `
        <div class="brand-signature">
          <span>NEOROAST COFFEE</span>
          <span class="brand-bean"></span>
          <span>BY DENU COFFEE</span>
        </div>`;
      const header = `
        <div class="topbar">
          <img class="logo" src="assets/logo.svg" alt="${escapeHtml(data.brand)}">
          <div class="day">${escapeHtml(day)}</div>
        </div>`;
      const step = scene.kind === "opening" ? "Intro" : scene.kind === "summary" ? "Summary" : `Point ${scene.step || index}`;
      return `${header}${signature}
        <section class="content video-content">
          <div class="video-scene-shell">
            <div class="video-visual-panel" aria-hidden="true">
              <span class="step-badge">${escapeHtml(scene.kind === "point" ? String(scene.step || index) : "i")}</span>
              ${renderVideoExtras(layout)}
              ${renderSceneArtwork(sceneName)}
            </div>
            <div class="video-copy">
              <p class="video-kicker">${escapeHtml(step)}</p>
              <h1 class="video-title check-fit">${lines(scene.title)}</h1>
              <p class="video-body check-fit">${lines(scene.subtitle)}</p>
            </div>
          </div>
          <div class="subtitle-strip check-fit">${lines(scene.narration || scene.subtitle || scene.title)}</div>
        </section>`;
    }

    function renderTopicVisual(scene) {
      const [, label, note] = getSceneMeta(scene);
      return `
        <div class="topic-visual" aria-hidden="true">
          ${renderSceneArtwork(scene)}
          <div class="topic-copy">
            <p class="topic-label">${label}</p>
            <p class="topic-note">${note}</p>
          </div>
        </div>`;
    }

    function renderSlide(data, slide) {
      const day = slide.eyebrow || `Day ${data.day}`;
      const scene = getScene(slide);
      const layout = getLayout(slide, scene);
      document.getElementById("stage").className = `stage scene-${scene} layout-${layout}`;
      const signature = `
        <div class="brand-signature">
          <span>NEOROAST COFFEE</span>
          <span class="brand-bean"></span>
          <span>BY DENU COFFEE</span>
        </div>
        <div class="stage-art" aria-hidden="true">${getSceneMeta(scene)[0]}</div>`;
      const header = `
        <div class="topbar">
          <img class="logo" src="assets/logo.svg" alt="${escapeHtml(data.brand)}">
          <div class="day">${escapeHtml(day)}</div>
        </div>`;

      if (slide.kind === "hook") {
        return `${header}${signature}
          <section class="content hook-content">
            <div>
              <h1 class="hook-title check-fit">${lines(slide.title)}</h1>
              <p class="hook-body check-fit">${lines(slide.body)}</p>
            </div>
            ${renderTopicVisual(scene)}
          </section>`;
      }

      const sections = (slide.sections || []).map((section, index) => `
        <article class="section check-fit" data-step="${index + 1}">
          <span class="mini-visual" aria-hidden="true">${getSceneMeta(scene)[0]}</span>
          <h2>${escapeHtml(section.heading)}</h2>
          <p>${lines(section.text)}</p>
        </article>`).join("");

      return `${header}${signature}
        <section class="content">
          <div>
            <h1 class="main-title check-fit">${lines(slide.title)}</h1>
            <div class="sections section-${layout}">${sections}</div>
          </div>
          <div class="footer check-fit">${lines(slide.footer)}</div>
        </section>`;
    }

    function fitText() {
      const nodes = [...document.querySelectorAll(".check-fit")];
      for (const node of nodes) {
        let size = parseFloat(getComputedStyle(node).fontSize);
        while (node.scrollWidth > node.clientWidth && size > 22) {
          size -= 2;
          node.style.fontSize = `${size}px`;
        }
      }
    }

    function applyDesign(design = {}) {
      const root = document.documentElement;
      const fontMap = {
        "myanmar-text": '"Myanmar Text", MyanmarSafe, Arial, sans-serif',
        "noto-sans-myanmar": '"Noto Sans Myanmar", MyanmarSafe, Arial, sans-serif',
        "myanmar3": 'Myanmar3, MyanmarSafe, Arial, sans-serif'
      };

      root.style.setProperty("--title-scale", Number(design.titleScale) || 1);
      root.style.setProperty("--body-scale", Number(design.bodyScale) || 1);
      root.style.setProperty("--myanmar-font", fontMap[design.font] || fontMap["myanmar-text"]);
      document.body.classList.add(`theme-${design.theme || "warm"}`);
    }

    function audit(data, slide) {
      const myanmarPattern = /[\u1000-\u109F]/;
      const issues = [];
      const text = document.getElementById("stage").innerText;
      if (!text.includes(`Day ${data.day}`)) issues.push("Missing day label");
      if (!myanmarPattern.test(text)) issues.push("No Myanmar text detected");
      for (const node of document.querySelectorAll(".check-fit")) {
        if (node.scrollWidth > node.clientWidth) {
          issues.push(`Text overflow: ${node.textContent.slice(0, 40)}`);
        }
      }
      const font = getComputedStyle(document.body).fontFamily;
      return {
        ok: issues.length === 0,
        day: data.day,
        slide: videoSceneIndex >= 0 ? videoSceneIndex + 1 : slideIndex + 1,
        font,
        textLength: text.length,
        issues
      };
    }

    fetch(dataFile)
      .then(response => {
        if (!response.ok) throw new Error(`Cannot load ${dataFile}`);
        return response.json();
      })
      .then(data => {
        const isVideoScene = videoSceneIndex >= 0;
        const slide = isVideoScene ? data.videoScenes?.[videoSceneIndex] : data.slides[slideIndex];
        if (!slide) throw new Error(`Slide ${slideIndex} does not exist`);
        applyDesign(data.design);
        if (params.get("video") === "1") document.body.classList.add("video-mode");
        if (params.get("export") === "1") {
          document.body.classList.add("export-mode");
          document.documentElement.style.setProperty("--export-scale", params.get("scale") || "1");
        }
        document.getElementById("stage").innerHTML = isVideoScene ? renderVideoScene(data, slide, videoSceneIndex + 1) : renderSlide(data, slide);
        fitText();
        const result = audit(data, slide);
        window.__DENUCHECK__ = result;
        document.getElementById("audit").textContent = JSON.stringify(result, null, 2);
        if (showAudit) document.body.classList.add("audit-on");
      })
      .catch(error => {
        document.getElementById("stage").innerHTML = `<section class="content"><h1 class="main-title">${escapeHtml(error.message)}</h1></section>`;
        window.__DENUCHECK__ = { ok: false, issues: [error.message] };
      });
  </script>
</body>
</html>
