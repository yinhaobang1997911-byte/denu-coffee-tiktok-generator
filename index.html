<!doctype html>
<html lang="my">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Denu Coffee TikTok Generator</title>
  <style>
    @font-face {
      font-family: "MyanmarSafe";
      src: local("Myanmar Text"), local("Myanmar3"), local("Myanmar Unicode"), local("Noto Sans Myanmar");
    }

    :root {
      --coffee: #24170f;
      --cream: #fff4e4;
      --milk: #f6dfbd;
      --caramel: #d99a4e;
      --berry: #c44f68;
      --citrus: #f3b642;
      --leaf: #3f7a55;
      --ink: #21180f;
      --title-scale: 1;
      --body-scale: 1;
      --myanmar-font: MyanmarSafe, "Myanmar Text", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #14100d;
      color: var(--cream);
      font-family: var(--myanmar-font);
    }

    body.export-mode {
      width: calc(1080px * var(--export-scale, 1));
      min-height: calc(1350px * var(--export-scale, 1));
      display: block;
      overflow: hidden;
      background: #14100d;
    }

    body.export-mode .stage {
      transform: scale(var(--export-scale, 1));
      transform-origin: top left;
    }

    .stage {
      width: 1080px;
      height: 1350px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 12%, rgba(255,244,228,.22), transparent 28%),
        radial-gradient(circle at 82% 18%, rgba(196,79,104,.25), transparent 28%),
        linear-gradient(150deg, #2b1a11 0%, #51331f 44%, #1c120d 100%);
      isolation: isolate;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 54px 54px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.9), rgba(0,0,0,.15));
      z-index: -2;
    }

    .stage::after {
      content: "";
      position: absolute;
      width: 900px;
      height: 900px;
      right: -260px;
      bottom: -260px;
      background:
        radial-gradient(circle, rgba(217,154,78,.26) 0 16%, transparent 17%),
        conic-gradient(from 20deg, rgba(255,244,228,.18), rgba(196,79,104,.2), rgba(63,122,85,.18), rgba(255,244,228,.18));
      border-radius: 50%;
      filter: blur(.2px);
      opacity: .95;
      z-index: -1;
    }

    .topbar {
      position: absolute;
      left: 64px;
      right: 64px;
      top: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .logo {
      width: 252px;
      height: auto;
      display: block;
    }

    .day {
      min-width: 158px;
      padding: 16px 26px 13px;
      border: 2px solid rgba(255,244,228,.42);
      border-radius: 999px;
      color: var(--cream);
      text-align: center;
      font: 800 31px/1 Arial, sans-serif;
      background: rgba(36,23,15,.46);
      backdrop-filter: blur(8px);
    }

    .content {
      position: absolute;
      inset: 184px 64px 70px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 30px;
    }

    .hook-title,
    .main-title {
      margin: 0;
      color: var(--cream);
      font-weight: 900;
      line-height: 1.24;
      letter-spacing: 0;
      text-wrap: balance;
      text-shadow: 0 8px 28px rgba(0,0,0,.36);
    }

    .hook-title { font-size: calc(78px * var(--title-scale)); max-width: 920px; }
    .main-title { font-size: calc(62px * var(--title-scale)); max-width: 920px; }

    .hook-body,
    .footer {
      color: #ffe1b3;
      font-weight: 700;
      line-height: 1.48;
      letter-spacing: 0;
    }

    .hook-body {
      max-width: 790px;
      font-size: calc(38px * var(--body-scale));
    }

    .visual-row {
      display: flex;
      gap: 30px;
      align-items: center;
      min-height: 390px;
    }

    .hero-cup {
      width: 408px;
      height: 408px;
      position: relative;
      flex: 0 0 408px;
    }

    .plate {
      position: absolute;
      inset: 66px 26px 24px;
      border-radius: 50%;
      background: #f6dfbd;
      box-shadow: 0 34px 90px rgba(0,0,0,.38);
    }

    .coffee {
      position: absolute;
      inset: 112px 72px 72px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 38% 35%, #9f6a3c 0 7%, transparent 8%),
        radial-gradient(circle at 58% 62%, #5b321d 0 16%, transparent 17%),
        radial-gradient(circle, #3b2114 0 52%, #1f120d 53% 100%);
      border: 18px solid #fff4e4;
      box-shadow: inset 0 0 0 10px rgba(217,154,78,.22);
    }

    .fruit {
      position: absolute;
      border-radius: 50%;
      box-shadow: 0 18px 36px rgba(0,0,0,.28);
    }

    .fruit.berry { width: 84px; height: 84px; left: 18px; bottom: 74px; background: var(--berry); }
    .fruit.orange { width: 112px; height: 112px; right: 4px; top: 46px; background: var(--citrus); }
    .fruit.leaf { width: 80px; height: 42px; right: 52px; bottom: 50px; background: var(--leaf); border-radius: 80px 8px 80px 8px; transform: rotate(-18deg); }

    .tag-stack {
      flex: 1;
      display: grid;
      gap: 18px;
    }

    .tag {
      padding: 23px 27px 20px;
      color: var(--cream);
      background: rgba(255,244,228,.11);
      border: 1px solid rgba(255,244,228,.24);
      border-radius: 8px;
      font: 800 31px/1.15 Arial, sans-serif;
      box-shadow: 0 18px 42px rgba(0,0,0,.18);
    }

    .sections {
      display: grid;
      gap: 22px;
      margin-top: 20px;
    }

    .section {
      padding: 27px 30px 24px;
      border-radius: 8px;
      background: rgba(255,244,228,.94);
      color: var(--ink);
      box-shadow: 0 18px 55px rgba(0,0,0,.25);
      border-left: 13px solid var(--caramel);
    }

    .section:nth-child(2) { border-left-color: var(--berry); }
    .section:nth-child(3) { border-left-color: var(--leaf); }

    .section h2 {
      margin: 0 0 12px;
      color: #8f4f23;
      font: 900 35px/1.05 Arial, sans-serif;
      letter-spacing: 0;
    }

    .section p {
      margin: 0;
      font-size: calc(31px * var(--body-scale));
      font-weight: 650;
      line-height: 1.48;
      letter-spacing: 0;
    }

    .footer {
      margin-top: 16px;
      padding: 25px 30px 22px;
      font-size: calc(33px * var(--body-scale));
      background: rgba(36,23,15,.7);
      border: 1px solid rgba(255,244,228,.24);
      border-radius: 8px;
    }

    .audit {
      position: fixed;
      left: 16px;
      bottom: 16px;
      max-width: 760px;
      padding: 12px 14px;
      border-radius: 8px;
      background: #fff;
      color: #111;
      font: 14px/1.4 Consolas, monospace;
      display: none;
      white-space: pre-wrap;
    }

    body.audit-on .audit { display: block; }

    body.theme-minimal .stage {
      background: linear-gradient(145deg, #25313a 0%, #45525a 100%);
    }

    body.theme-minimal .stage::after {
      opacity: .3;
      filter: grayscale(1);
    }

    body.theme-fresh .stage {
      background: linear-gradient(145deg, #18382d 0%, #3f7a55 55%, #172a23 100%);
    }

    body.theme-fresh .stage::after {
      opacity: .62;
    }

    body.theme-dark .stage {
      background: linear-gradient(145deg, #101010 0%, #2b211d 55%, #090909 100%);
    }

    body.theme-dark .stage::after {
      opacity: .45;
      filter: grayscale(.65);
    }

    /* NeoRoast default visual system: warm educational cards over a branded photo layer. */
    .stage {
      background: #f7ead8 url("assets/neoroast-background.png") center/cover no-repeat;
      color: #321a08;
    }

    .stage::before {
      background: linear-gradient(180deg, rgba(255,248,236,.08), rgba(255,248,236,.18));
      mask-image: none;
    }

    .stage::after { display: none; }

    .topbar {
      left: 32px;
      right: 38px;
      top: 28px;
      flex-direction: row-reverse;
      align-items: flex-start;
    }

    .logo { width: 278px; }

    .day {
      min-width: 220px;
      padding: 17px 27px 16px;
      border: 0;
      color: #fffaf0;
      font-size: 34px;
      background: #321a08;
      box-shadow: 0 9px 26px rgba(50,26,8,.12);
    }

    .day::before,
    .day::after {
      content: "◆";
      margin: 0 13px;
      color: #d99436;
      font-size: 19px;
      vertical-align: 3px;
    }

    .content {
      inset: 188px 66px 116px;
      gap: 23px;
    }

    .hook-content {
      justify-content: flex-start;
      text-align: center;
      padding-top: 76px;
    }

    .hook-title,
    .main-title {
      max-width: 948px;
      color: #321a08;
      text-shadow: 0 4px 16px rgba(255,244,228,.78);
    }

    .hook-title { font-size: calc(76px * var(--title-scale)); }
    .main-title { font-size: calc(57px * var(--title-scale)); text-align: center; }

    .hook-body {
      max-width: 800px;
      margin: 36px auto 0;
      padding: 18px 24px;
      color: #fffaf0;
      font-size: calc(34px * var(--body-scale));
      background: rgba(80,38,7,.94);
      border-radius: 999px;
    }

    .hook-content .visual-row {
      display: none;
    }

    .sections {
      gap: 16px;
      margin-top: 27px;
    }

    .section {
      min-height: 194px;
      padding: 24px 28px 22px;
      border: 1px solid rgba(171,111,53,.34);
      border-left: 1px solid rgba(171,111,53,.34);
      border-radius: 18px;
      color: #321a08;
      background: rgba(255,247,235,.82);
      box-shadow: 0 12px 34px rgba(94,57,23,.07);
    }

    .section:nth-child(2),
    .section:nth-child(3) {
      border-left-color: rgba(171,111,53,.34);
    }

    .section h2 {
      margin-bottom: 10px;
      color: #321a08;
      font-size: 36px;
    }

    .section p {
      font-size: calc(29px * var(--body-scale));
      line-height: 1.42;
    }

    .footer {
      margin-top: 8px;
      padding: 18px 24px 17px;
      color: #fffaf0;
      font-size: calc(29px * var(--body-scale));
      text-align: center;
      background: rgba(80,38,7,.94);
      border: 0;
      border-radius: 999px;
    }

    .brand-signature {
      position: absolute;
      left: 50%;
      bottom: 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      color: #321a08;
      font: 700 15px/1 Arial, sans-serif;
      letter-spacing: 4px;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    .brand-signature::before,
    .brand-signature::after {
      content: "";
      width: 72px;
      border-top: 1px solid rgba(50,26,8,.56);
    }

    .brand-bean {
      width: 16px;
      height: 16px;
      display: inline-block;
      border-radius: 50%;
      background: #321a08;
      transform: rotate(-32deg);
    }

    body.theme-minimal .stage,
    body.theme-fresh .stage,
    body.theme-dark .stage {
      background-image: url("assets/neoroast-background.png");
      background-size: cover;
      background-position: center;
    }
  </style>
</head>
<body>
  <main id="stage" class="stage" aria-label="TikTok coffee post"></main>
  <pre id="audit" class="audit"></pre>

  <script>
    const params = new URLSearchParams(location.search);
    const dataFile = params.get("data") || "data/day-28.json";
    const slideIndex = Number(params.get("slide") || 0);
    const showAudit = params.get("audit") === "1";

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function lines(value) {
      return escapeHtml(value || "").replace(/\n/g, "<br>");
    }

    function renderSlide(data, slide) {
      const day = slide.eyebrow || `Day ${data.day}`;
      const signature = `
        <div class="brand-signature">
          <span>NEOROAST COFFEE</span>
          <span class="brand-bean"></span>
          <span>BY DENU COFFEE</span>
        </div>`;
      const header = `
        <div class="topbar">
          <img class="logo" src="assets/logo.svg" alt="${escapeHtml(data.brand)}">
          <div class="day">${escapeHtml(day)}</div>
        </div>`;

      if (slide.kind === "hook") {
        return `${header}${signature}
          <section class="content hook-content">
            <div>
              <h1 class="hook-title check-fit">${lines(slide.title)}</h1>
              <p class="hook-body check-fit">${lines(slide.body)}</p>
            </div>
            <div class="visual-row">
              <div class="hero-cup" aria-hidden="true">
                <div class="plate"></div>
                <div class="coffee"></div>
                <div class="fruit berry"></div>
                <div class="fruit orange"></div>
                <div class="fruit leaf"></div>
              </div>
              <div class="tag-stack">
                <div class="tag">No added fruit</div>
                <div class="tag">Natural aroma</div>
                <div class="tag">Specialty Coffee</div>
              </div>
            </div>
          </section>`;
      }

      const sections = (slide.sections || []).map(section => `
        <article class="section check-fit">
          <h2>${escapeHtml(section.heading)}</h2>
          <p>${lines(section.text)}</p>
        </article>`).join("");

      return `${header}${signature}
        <section class="content">
          <div>
            <h1 class="main-title check-fit">${lines(slide.title)}</h1>
            <div class="sections">${sections}</div>
          </div>
          <div class="footer check-fit">${lines(slide.footer)}</div>
        </section>`;
    }

    function fitText() {
      const nodes = [...document.querySelectorAll(".check-fit")];
      for (const node of nodes) {
        let size = parseFloat(getComputedStyle(node).fontSize);
        while (node.scrollWidth > node.clientWidth && size > 22) {
          size -= 2;
          node.style.fontSize = `${size}px`;
        }
      }
    }

    function applyDesign(design = {}) {
      const root = document.documentElement;
      const fontMap = {
        "myanmar-text": '"Myanmar Text", MyanmarSafe, Arial, sans-serif',
        "noto-sans-myanmar": '"Noto Sans Myanmar", MyanmarSafe, Arial, sans-serif',
        "myanmar3": 'Myanmar3, MyanmarSafe, Arial, sans-serif'
      };

      root.style.setProperty("--title-scale", Number(design.titleScale) || 1);
      root.style.setProperty("--body-scale", Number(design.bodyScale) || 1);
      root.style.setProperty("--myanmar-font", fontMap[design.font] || fontMap["myanmar-text"]);
      document.body.classList.add(`theme-${design.theme || "warm"}`);
    }

    function audit(data, slide) {
      const myanmarPattern = /[\u1000-\u109F]/;
      const issues = [];
      const text = document.getElementById("stage").innerText;
      if (!text.includes(`Day ${data.day}`)) issues.push("Missing day label");
      if (!myanmarPattern.test(text)) issues.push("No Myanmar text detected");
      for (const node of document.querySelectorAll(".check-fit")) {
        if (node.scrollWidth > node.clientWidth) {
          issues.push(`Text overflow: ${node.textContent.slice(0, 40)}`);
        }
      }
      const font = getComputedStyle(document.body).fontFamily;
      return {
        ok: issues.length === 0,
        day: data.day,
        slide: slideIndex + 1,
        font,
        textLength: text.length,
        issues
      };
    }

    fetch(dataFile)
      .then(response => {
        if (!response.ok) throw new Error(`Cannot load ${dataFile}`);
        return response.json();
      })
      .then(data => {
        const slide = data.slides[slideIndex];
        if (!slide) throw new Error(`Slide ${slideIndex} does not exist`);
        applyDesign(data.design);
        if (params.get("export") === "1") {
          document.body.classList.add("export-mode");
          document.documentElement.style.setProperty("--export-scale", params.get("scale") || "1");
        }
        document.getElementById("stage").innerHTML = renderSlide(data, slide);
        fitText();
        const result = audit(data, slide);
        window.__DENUCHECK__ = result;
        document.getElementById("audit").textContent = JSON.stringify(result, null, 2);
        if (showAudit) document.body.classList.add("audit-on");
      })
      .catch(error => {
        document.getElementById("stage").innerHTML = `<section class="content"><h1 class="main-title">${escapeHtml(error.message)}</h1></section>`;
        window.__DENUCHECK__ = { ok: false, issues: [error.message] };
      });
  </script>
</body>
</html>
